openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ID Document Extraction API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: ID document operations
  - name: records
    description: Extracted record operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a PDF document for extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "200":
          description: Document processed and data extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records:
    get:
      operationId: listRecords
      tags: [records]
      summary: List all extracted records
      responses:
        "200":
          description: List of records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Record"

  /records/{id}:
    get:
      operationId: getRecord
      tags: [records]
      summary: Get a single extracted record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateRecord
      tags: [records]
      summary: Update an extracted record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteRecord
      tags: [records]
      summary: Delete an extracted record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records/stats:
    get:
      operationId: getRecordStats
      tags: [records]
      summary: Get statistics about extracted records
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DocumentInput:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
        - file

    ExtractionResult:
      type: object
      properties:
        record:
          $ref: "#/components/schemas/Record"
        rawText:
          type: string
      required:
        - record
        - rawText

    Record:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        idNumber:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        documentType:
          type: ["string", "null"]
        fatherName:
          type: ["string", "null"]
        motherName:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        religion:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        nameBangla:
          type: ["string", "null"]
        pin:
          type: ["string", "null"]
        birthPlace:
          type: ["string", "null"]
        issueDate:
          type: ["string", "null"]
        photoFront:
          type: ["string", "null"]
        photoBack:
          type: ["string", "null"]
        rawText:
          type: string
        fileName:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - rawText
        - fileName
        - createdAt
        - updatedAt

    RecordUpdate:
      type: object
      properties:
        fullName:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        idNumber:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        documentType:
          type: ["string", "null"]
        fatherName:
          type: ["string", "null"]
        motherName:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        religion:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        nameBangla:
          type: ["string", "null"]
        pin:
          type: ["string", "null"]
        birthPlace:
          type: ["string", "null"]
        issueDate:
          type: ["string", "null"]
        photoFront:
          type: ["string", "null"]
        photoBack:
          type: ["string", "null"]

    RecordStats:
      type: object
      properties:
        total:
          type: integer
        todayCount:
          type: integer
        documentTypes:
          type: array
          items:
            $ref: "#/components/schemas/DocumentTypeCount"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Record"
      required:
        - total
        - todayCount
        - documentTypes
        - recentActivity

    DocumentTypeCount:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
      required:
        - type
        - count

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
